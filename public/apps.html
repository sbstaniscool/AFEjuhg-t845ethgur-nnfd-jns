<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies - Apple</title>
  
  <link rel="shortcut icon" href="./assets/images/icon.png" type="image/png" />
  
  <!-- Use your movie.css -->
  <link rel="stylesheet" href="movie.css">
  
  <!-- Navbar Styling -->
  <style>
    nav {
      background: #0f0f0f;
      border-bottom: 1px solid #222;
      padding: 12px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      height: 32px;
      width: auto;
    }

    .logo h1 {
      margin: 0;
      font-size: 1.7rem;
      color: #fff;
    }

    #time {
      color: #888;
      font-size: 1rem;
      margin: 0 20px;
    }

    .navitems {
      display: flex;
      gap: 28px;
    }

    .navitem a {
      color: #ccc;
      text-decoration: none;
      font-size: 1.05rem;
      transition: color 0.2s ease;
    }

    .navitem a:hover {
      color: #fff;
    }

    .navitem a.active {
      color: #e50914;
      font-weight: 600;
    }

    .main-content {
      padding-top: 40px;
    }
  </style>
</head>
<body theme="main">

  <!-- Navigation Bar -->
  <nav>
    <div class="logo">
      <img src="./assets/images/icon.png" alt="Logo" draggable="false" />
      <h1>Apple</h1>
    </div>
    
    <p id="time"></p>
    
    <div class="navitems">
      <div class="navitem"><a href="/">Home</a></div>
      <div class="navitem"><a href="/gs.html">Games</a></div>
      <div class="navitem"><a href="/apps.html" class="active">Movies</a></div>
      <div class="navitem"><a href="/emulator.html">Emulator</a></div>
      <div class="navitem"><a href="/search.html">Search</a></div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <h1>🎥 Movies</h1>
    <div class="grid" id="movieGrid"></div>
  </div>

  <script>
    async function loadMovies() {
      try {
        const response = await fetch('movies.json');
        const data = await response.json();
        const movies = data.movies || [];

        const grid = document.getElementById('movieGrid');
        grid.innerHTML = '';

        movies.forEach(movie => {
          const card = document.createElement('div');
          card.className = 'movie-card';

          let imageHTML = '';
          if (movie.image && movie.image !== "there is none") {
            imageHTML = `<img src="${movie.image}" alt="${movie.name}" 
                         onerror="this.style.display='none'; this.parentElement.querySelector('.no-image').style.display='flex';">`;
          } else {
            imageHTML = `<div class="no-image">No Image Available</div>`;
          }

          card.innerHTML = `
            ${imageHTML}
            <div class="movie-info">
              <h3>${movie.name}</h3>
              <button class="play-btn" onclick="playMovie('${movie.url}')">▶ Watch Now</button>
            </div>
          `;

          // Hidden fallback for broken images
          if (movie.image && movie.image !== "there is none") {
            const noImageDiv = document.createElement('div');
            noImageDiv.className = 'no-image';
            noImageDiv.style.display = 'none';
            noImageDiv.textContent = 'No Image Available';
            card.appendChild(noImageDiv);
          }

          grid.appendChild(card);
        });
      } catch (error) {
        console.error('Error loading movies:', error);
        document.getElementById('movieGrid').innerHTML = `
          <p style="color: red; grid-column: 1 / -1; text-align: center; padding: 60px;">
            Failed to load movies.json
          </p>`;
      }
    }

    function playMovie(url) {
      if (!url) return;
      if (url.startsWith('http') || /\.(mp4|mov|mkv|webm)$/i.test(url)) {
        window.open(url, '_blank');
      } else {
        window.location.href = url;
      }
    }

    // Live Time
    function updateTime() {
      const timeEl = document.getElementById('time');
      setInterval(() => {
        const now = new Date();
        timeEl.textContent = now.toLocaleTimeString('en-US', { 
          hour: '2-digit', 
          minute: '2-digit' 
        });
      }, 1000);
    }

    // Initialize
    window.onload = () => {
      loadMovies();
      updateTime();
    };
  </script>
</body>
</html>
