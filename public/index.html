<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies - Apple</title>
  
  <!-- Link to external CSS -->
  <link rel="stylesheet" href="movie.css">
  
  <!-- Optional: Add favicon if you have one -->
  <!-- <link rel="shortcut icon" href="./assets/images/icon.png" type="image/png"> -->
</head>
<body>

  <!-- Navigation Bar -->
  <nav>
    <div class="logo">
      <img src="./assets/images/icon.png" alt="Logo" draggable="false">
      <h1>Apple</h1>
    </div>
    
    <p id="time"></p>
    
    <div class="navitems">
      <div class="navitem"><a href="/">Home</a></div>
      <div class="navitem"><a href="/gs.html">Games</a></div>
      <div class="navitem"><a href="/app.html" class="active">Movies</a></div>
      <div class="navitem"><a href="/emulator.html">Emulator</a></div>
      <div class="navitem"><a href="/search.html">Search</a></div>
    </div>
  </nav>

  <!-- Main Content -->
  <h1>🎥 Movies</h1>
  <div class="grid" id="movieGrid"></div>

  <script>
    async function loadMovies() {
      try {
        const response = await fetch('movies.json');
        const data = await response.json();
        const movies = data.movies || [];

        const grid = document.getElementById('movieGrid');
        grid.innerHTML = '';

        movies.forEach(movie => {
          const card = document.createElement('div');
          card.className = 'movie-card';

          let imageHTML = movie.image && movie.image !== "there is none"
            ? `<img src="${movie.image}" alt="${movie.name}" 
                 onerror="this.style.display='none'; this.parentElement.querySelector('.no-image').style.display='flex';">`
            : `<div class="no-image">No Image Available</div>`;

          card.innerHTML = `
            ${imageHTML}
            <div class="movie-info">
              <h3>${movie.name}</h3>
              <button class="play-btn" onclick="playMovie('${movie.url}')">▶ Watch Now</button>
            </div>
          `;

          // Add fallback no-image div if image exists but fails to load
          if (movie.image && movie.image !== "there is none") {
            const noImageDiv = document.createElement('div');
            noImageDiv.className = 'no-image';
            noImageDiv.style.display = 'none';
            noImageDiv.textContent = 'No Image Available';
            card.appendChild(noImageDiv);
          }

          grid.appendChild(card);
        });
      } catch (error) {
        console.error('Error loading movies:', error);
        document.getElementById('movieGrid').innerHTML = `
          <p style="color: red; grid-column: 1 / -1; text-align: center; padding: 60px; font-size: 1.1rem;">
            Failed to load movies.json<br>
            <small>Make sure the file exists in the same folder as app.html</small>
          </p>`;
      }
    }

    function playMovie(url) {
      if (!url) return;
      if (url.startsWith('http') || /\.(mp4|mov|mkv|webm)$/i.test(url)) {
        window.open(url, '_blank');
      } else {
        window.location.href = url;
      }
    }

    // Load movies on page load
    window.onload = loadMovies;

    // Optional: Show current time in nav (like your example)
    function updateTime() {
      const timeEl = document.getElementById('time');
      if (timeEl) {
        setInterval(() => {
          const now = new Date();
          timeEl.textContent = now.toLocaleTimeString('en-US', { 
            hour: '2-digit', 
            minute: '2-digit' 
          });
        }, 1000);
      }
    }
    updateTime();
  </script>
</body>
</html>
