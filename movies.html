<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f0f;
      color: #fff;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2.8rem;
      color: #e50914;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 25px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .movie-card {
      background: #1f1f1f;
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .movie-card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 15px 30px rgba(229, 9, 20, 0.4);
    }

    .movie-card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
    }

    .no-image {
      background: #333;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 320px;
      font-style: italic;
      font-size: 1rem;
    }

    /* Movie Info - Dark background with White Text */
    .movie-info {
      background: #1f1f1f;
      padding: 16px 12px;
      text-align: center;
      border-radius: 0 0 12px 12px;
    }

    .movie-info h3 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: #ffffff;           /* White text as requested */
      line-height: 1.3;
    }

    .play-btn {
      background: #e50914;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .play-btn:hover {
      background: #f40612;
      transform: scale(1.05);
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        gap: 18px;
      }
      
      .movie-card img, .no-image {
        height: 250px;
      }
    }
  </style>
</head>
<body>
  <h1>🎥 Movies</h1>
  <div class="grid" id="movieGrid"></div>

  <script>
    async function loadMovies() {
      try {
        const response = await fetch('movies.json');
        const data = await response.json();
        const movies = data.movies || [];
        
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = '';

        movies.forEach(movie => {
          const card = document.createElement('div');
          card.className = 'movie-card';
          
          let imageHTML = movie.image && movie.image !== "there is none" 
            ? `<img src="${movie.image}" alt="${movie.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`
            : `<div class="no-image">No Image Available</div>`;

          card.innerHTML = `
            ${imageHTML}
            <div class="movie-info">
              <h3>${movie.name}</h3>
              <button class="play-btn" onclick="playMovie('${movie.url}')">▶ Watch Now</button>
            </div>
          `;
          
          grid.appendChild(card);
        });
      } catch (error) {
        console.error('Error loading movies:', error);
        document.getElementById('movieGrid').innerHTML = `
          <p style="color: red; grid-column: 1 / -1; text-align: center; padding: 50px;">
            Failed to load movies.json. Please make sure the file exists.
          </p>`;
      }
    }

    function playMovie(url) {
      if (url.startsWith('http') || url.includes('.mp4') || url.includes('.mov') || url.includes('.mkv')) {
        window.open(url, '_blank');
      } else {
        window.location.href = url;
      }
    }

    window.onload = loadMovies;
  </script>
</body>
</html>
